properties:
  configuration:
    ingress:
      external: true
      stickySessions:
        affinity: sticky
      targetPort: 8089
      transport: http
  template:
    scale:
      minReplicas: 2
      maxReplicas: 2
    containers:
      - name: ca-rest-soap-labs
        image: restsoaplabs.azurecr.io/rest-soap-labs:report-sticky-20260610
        env:
          - name: SOAP_DAST_HOST
            value: 0.0.0.0
          - name: SOAP_DAST_VULN_PORT
            value: "8089"
          - name: SOAP_DAST_VULN_PUBLIC_PORT
            value: "443"
          - name: SOAP_DAST_DB_PATH
            value: /data/rest_soap_labs.db
        volumeMounts:
          - volumeName: rest-soap-labs-data
            mountPath: /data
        resources:
          cpu: 2.0
          memory: 4Gi
    volumes:
      - name: rest-soap-labs-data
        storageType: AzureFile
        storageName: rest-soap-labs-data
